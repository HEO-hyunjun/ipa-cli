# Optional legacy workspace profile.yaml.
#
# Prefer registering the profile in ~/.config/ipa/profile.yaml:
#
# profiles:
#   sample:
#     vault_path: /path/to/vault
#     default: true
#
# This file remains useful as a workspace-local fallback when you copy the
# sample_profile directory under ~/.config/ipa/profiles/<name>/.
# vault_path supports ${VAR} interpolation against the process env.
vault_path: ${IPA_VAULT_PATH}
